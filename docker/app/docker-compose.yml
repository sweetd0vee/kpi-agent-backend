name: ai-kpi

services:
  db:
    image: postgres:16-bookworm
    container_name: ai-kpi_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai-kpi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-kpi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_kpi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: docker/app/Dockerfile
    image: ai-kpi-be
    container_name: ai-kpi-be
    hostname: ai-kpi_api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/ai_kpi}
      POSTGRES_DB: ${POSTGRES_DB:-ai_kpi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USE_MINIO: ${USE_MINIO:-false}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ai-kpi

  minio:
    image: minio/minio:latest
    container_name: ai-kpi_minio
    hostname: minio
    command: server --console-address ":9001" /data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - ai-kpi
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai-kpi_ollama
    hostname: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-kpi
    restart: unless-stopped

networks:
  ai-kpi:
    name: ai-kpi
    external: true

volumes:
  postgres_data:
  uploads_data:
  minio_data:
  ollama_data:
